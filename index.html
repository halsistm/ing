<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
body{background:#000;overflow:hidden}
canvas{display:block;cursor:crosshair}
canvas.locked{cursor:none}

/* mobile stick */
#stick-zone{
  display:none;
  position:fixed;bottom:0;left:0;
  width:50vw;height:220px;z-index:100;
  touch-action:none
}
#stick-ring{
  position:absolute;bottom:48px;left:48px;
  width:108px;height:108px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(0,0,0,0.35)
}
#stick-knob{
  position:absolute;top:50%;left:50%;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.35);
  transform:translate(-50%,-50%);
  transition:none;pointer-events:none
}
#look-right{
  display:none;
  position:fixed;top:0;right:0;
  width:50vw;height:100vh;z-index:90;
  touch-action:none
}

/* pc hint */
#pc-hint{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:rgba(255,255,255,0.35);font-size:11px;
  letter-spacing:0.5em;z-index:200;
  pointer-events:none;
  font-family:'Helvetica Neue',sans-serif;
  transition:opacity 1s
}
#pc-hint.hidden{opacity:0}

#room-info{
  position:fixed;top:28px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.2);font-size:10px;
  letter-spacing:0.5em;z-index:100;
  pointer-events:none;
  font-family:'Helvetica Neue',sans-serif
}
#door-hint{
  position:fixed;bottom:48px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.55);font-size:10px;
  letter-spacing:0.4em;opacity:0;
  transition:opacity 0.6s;z-index:100;
  pointer-events:none;
  font-family:'Helvetica Neue',sans-serif
}
#door-hint.visible{opacity:1}
#loading{
  position:fixed;inset:0;background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:1000;gap:24px;transition:opacity 1.4s
}
#loading.fade{opacity:0;pointer-events:none}
#loading-text{
  color:rgba(255,255,255,0.3);font-size:10px;
  letter-spacing:0.6em;
  font-family:'Helvetica Neue',sans-serif
}
#loading-error{
  display:none;
  flex-direction:column;align-items:center;gap:16px
}
#loading-error-msg{
  color:rgba(255,80,80,0.7);font-size:9px;
  letter-spacing:0.5em;
  font-family:'Helvetica Neue',sans-serif
}
#reload-btn{
  background:none;
  border:1px solid rgba(255,255,255,0.25);
  color:rgba(255,255,255,0.6);
  font-size:9px;letter-spacing:0.5em;
  font-family:'Helvetica Neue',sans-serif;
  padding:10px 28px;cursor:pointer;
  transition:border-color 0.2s,color 0.2s
}
#reload-btn:hover{border-color:rgba(255,255,255,0.6);color:rgba(255,255,255,0.9)}
#progress-bar{
  width:180px;height:1px;
  background:rgba(255,255,255,0.08)
}
#progress-fill{
  height:100%;width:0%;
  background:rgba(255,255,255,0.4);
  transition:width 0.3s
}
#fade{
  position:fixed;inset:0;
  background:#000;opacity:0;
  pointer-events:none;z-index:500;
  transition:opacity 0.35s ease
}

/* ---- タイトル画面 ---- */
#title-screen{
  position:fixed;inset:0;
  background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:1100;gap:0;
  opacity:0;pointer-events:none;
  transition:opacity 1.2s
}
#title-screen.visible{opacity:1;pointer-events:auto}
#title-screen.fade-out{opacity:0;pointer-events:none}
#title-logo{
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:clamp(32px,8vw,64px);
  font-weight:200;
  letter-spacing:0.18em;
  color:rgba(255,255,255,0.88);
  margin-bottom:10px;
  position:relative;
  text-shadow:0 0 40px rgba(255,255,255,0.15)
}
#title-logo .inf{
  display:inline-block;
  font-size:1.15em;
  line-height:1;
  vertical-align:middle;
  margin-right:0.12em;
  opacity:0.7;
  animation:titleInfSpin 8s linear infinite
}
@keyframes titleInfSpin{
  0%{opacity:0.5;transform:scaleX(1)}
  50%{opacity:0.9;transform:scaleX(-1)}
  100%{opacity:0.5;transform:scaleX(1)}
}
#title-sub{
  font-family:'Helvetica Neue',sans-serif;
  font-size:9px;letter-spacing:0.65em;
  color:rgba(255,255,255,0.22);
  margin-bottom:72px;
  text-transform:uppercase
}
.title-btn{
  background:none;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.55);
  font-family:'Helvetica Neue',sans-serif;
  font-size:11px;letter-spacing:0.55em;
  padding:16px 40px 14px;
  cursor:pointer;
  margin:6px 0;
  width:260px;
  text-align:center;
  transition:color 0.25s,border-color 0.25s,background 0.25s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
  overflow:hidden
}
.title-btn::before{
  content:'';
  position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background 0.2s
}
.title-btn:hover{
  color:rgba(255,255,255,0.95);
  border-color:rgba(255,255,255,0.45)
}
.title-btn:hover::before{background:rgba(255,255,255,0.04)}
.title-btn:active{color:rgba(255,255,255,1)}
#title-btn-new{margin-top:0}
#title-btn-continue{color:rgba(255,255,255,0.30)}
#title-btn-continue .continue-count{
  display:block;font-size:8px;
  letter-spacing:0.4em;
  color:rgba(100,180,255,0.45);
  margin-top:4px
}
#title-deco{
  position:absolute;
  top:50%;left:50%;
  width:340px;height:340px;
  transform:translate(-50%,-50%);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:50%;
  animation:titleDecoRot 18s linear infinite;
  pointer-events:none
}
#title-deco2{
  position:absolute;
  top:50%;left:50%;
  width:480px;height:480px;
  transform:translate(-50%,-50%);
  border:1px solid rgba(255,255,255,0.025);
  border-radius:50%;
  animation:titleDecoRot 28s linear infinite reverse;
  pointer-events:none
}
@keyframes titleDecoRot{
  from{transform:translate(-50%,-50%) rotate(0deg)}
  to{transform:translate(-50%,-50%) rotate(360deg)}
}
#title-version{
  position:absolute;bottom:28px;
  font-family:'Helvetica Neue',sans-serif;
  font-size:8px;letter-spacing:0.5em;
  color:rgba(255,255,255,0.1)
}
#next-room-btn{
  position:fixed;bottom:32px;right:24px;
  z-index:150;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.6);
  font-size:9px;letter-spacing:0.45em;
  font-family:'Helvetica Neue',sans-serif;
  padding:10px 18px;cursor:pointer;
  transition:background 0.2s,color 0.2s;
  -webkit-tap-highlight-color:transparent;
  user-select:none
}
#next-room-btn:hover{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9)}
#speed-indicator{
  position:fixed;top:28px;right:24px;
  color:rgba(255,255,255,0.0);font-size:9px;
  letter-spacing:0.4em;z-index:100;
  pointer-events:none;
  font-family:'Helvetica Neue',sans-serif;
  transition:color 0.5s
}
#speed-indicator.running{color:rgba(255,200,100,0.5)}

/* memo popup */
#memo-popup{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-62%);
  background:rgba(245,240,230,0.96);
  color:#1a1410;
  font-family:'Courier New',monospace;
  font-size:12px;line-height:1.75;
  padding:22px 28px;
  max-width:320px;min-width:220px;
  box-shadow:0 4px 32px rgba(0,0,0,0.55);
  border:1px solid rgba(120,100,60,0.35);
  pointer-events:none;
  z-index:300;opacity:0;
  transition:opacity 0.4s;
  white-space:pre-wrap;
  filter:drop-shadow(0 0 8px rgba(180,140,60,0.3))
}
#memo-popup.visible{opacity:1}
#memo-label{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,240,180,0.7);font-size:9px;
  letter-spacing:0.45em;z-index:200;
  pointer-events:none;opacity:0;
  font-family:'Helvetica Neue',sans-serif;
  transition:opacity 0.3s
}
#memo-label.visible{opacity:1}

/* capture button */
#shoot-btn{
  position:fixed;bottom:48px;right:48px;
  width:108px;height:108px;border-radius:50%;
  background:rgba(0,8,20,0.72);
  border:2px solid rgba(0,200,255,0.55);
  color:#00eeff;font-size:10px;
  letter-spacing:0.32em;font-weight:bold;
  font-family:'Helvetica Neue',sans-serif;
  cursor:pointer;
  z-index:300;opacity:0;
  transition:opacity 0.35s, box-shadow 0.3s, border-color 0.3s;
  pointer-events:none;
  -webkit-tap-highlight-color:transparent;
  text-shadow:0 0 8px rgba(0,200,255,0.5);
  box-shadow:0 0 0 0 rgba(0,200,255,0), inset 0 0 18px rgba(0,100,255,0.08);
  display:flex;align-items:center;justify-content:center;
  text-align:center;line-height:1.4;
  transform:none
}
#shoot-btn.visible{opacity:1;pointer-events:auto}
#shoot-btn.glowing{
  border-color:rgba(0,230,255,1);
  box-shadow:0 0 18px 5px rgba(0,200,255,0.55), 0 0 40px 10px rgba(0,120,255,0.25), inset 0 0 22px rgba(0,160,255,0.18);
  animation:captureGlow 1.1s ease-in-out infinite alternate
}
@keyframes captureGlow{
  from{box-shadow:0 0 14px 4px rgba(0,200,255,0.45), 0 0 32px 8px rgba(0,120,255,0.2), inset 0 0 18px rgba(0,160,255,0.12)}
  to{box-shadow:0 0 28px 10px rgba(0,230,255,0.75), 0 0 55px 18px rgba(0,150,255,0.35), inset 0 0 30px rgba(0,180,255,0.28)}
}
#shoot-btn:active{transform:scale(0.91);transition:transform 0.08s}
#crosshair-hit{
  position:fixed;top:50%;left:50%;
  width:28px;height:28px;
  transform:translate(-50%,-50%);
  border:1.5px solid rgba(0,200,255,0);
  border-radius:50%;pointer-events:none;
  z-index:200;transition:border-color 0.2s
}
#crosshair-hit.aimed{border-color:rgba(0,200,255,0.8)}

/* capture notification */
#capture-notify{
  position:fixed;top:38%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,12,28,0.92);
  border:1px solid rgba(0,200,255,0.45);
  color:rgba(200,240,255,0.95);
  font-family:'Helvetica Neue',sans-serif;
  font-size:10px;letter-spacing:0.45em;
  padding:14px 28px 12px;
  z-index:500;opacity:0;pointer-events:none;
  transition:opacity 0.3s;
  box-shadow:0 0 24px rgba(0,180,255,0.18),inset 0 0 18px rgba(0,100,255,0.08)
}
#capture-notify.visible{opacity:1}
#capture-name{
  font-size:15px;letter-spacing:0.3em;
  color:#00eeff;display:block;
  margin-bottom:5px;text-align:center
}
#capture-sub{
  font-size:9px;letter-spacing:0.4em;
  color:rgba(150,210,255,0.65);
  display:block;text-align:center
}

/* 図鑑ボタン */
#zukan-btn{
  position:fixed;bottom:32px;left:24px;
  z-index:150;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(0,180,255,0.28);
  color:rgba(0,180,255,0.75);
  font-size:9px;letter-spacing:0.45em;
  font-family:'Helvetica Neue',sans-serif;
  padding:10px 18px;cursor:pointer;
  transition:background 0.2s,color 0.2s;
  -webkit-tap-highlight-color:transparent;
  user-select:none
}
#zukan-btn:hover{background:rgba(0,100,255,0.15);color:rgba(0,220,255,0.95)}

/* コレクションオーバーレイ */
#collection-overlay{
  position:fixed;inset:0;
  background:rgba(0,4,12,0.97);
  z-index:700;display:none;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  font-family:'Helvetica Neue',sans-serif
}
#collection-overlay.open{display:block}
#collection-header{
  position:sticky;top:0;
  background:rgba(0,4,12,0.98);
  border-bottom:1px solid rgba(0,180,255,0.14);
  padding:20px 24px 14px;
  display:flex;align-items:baseline;gap:16px;
  z-index:10
}
#collection-title{
  color:rgba(200,240,255,0.9);
  font-size:11px;letter-spacing:0.55em
}
#collection-count{
  color:rgba(0,180,255,0.7);
  font-size:9px;letter-spacing:0.4em
}
#collection-close{
  margin-left:auto;
  background:none;border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.45);
  font-size:9px;letter-spacing:0.4em;
  padding:6px 14px;cursor:pointer;
  font-family:'Helvetica Neue',sans-serif;
  transition:border-color 0.2s,color 0.2s
}
#collection-close:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.8)}
#collection-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:12px;padding:20px 20px 40px
}
.cr-card{
  background:rgba(4,10,20,0.9);
  border:1px solid rgba(255,255,255,0.07);
  padding:12px 10px 10px;
  display:flex;flex-direction:column;
  align-items:center;gap:7px;
  cursor:pointer;transition:border-color 0.25s,background 0.2s;
  height:230px;overflow:hidden
}
.cr-card:active{background:rgba(0,40,80,0.6)}

/* ---- card detail modal ---- */
#card-detail{
  position:fixed;inset:0;
  background:rgba(0,2,8,0.97);
  z-index:900;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Helvetica Neue',sans-serif;
  touch-action:none;
  -webkit-overflow-scrolling:touch
}
#card-detail.open{display:flex}
#card-detail-inner{
  position:relative;
  width:min(340px,88vw);
  background:rgba(4,10,24,0.98);
  border:1px solid rgba(0,180,255,0.22);
  box-shadow:0 0 48px rgba(0,140,255,0.12);
  padding:28px 24px 24px;
  display:flex;flex-direction:column;
  align-items:center;gap:11px;
  user-select:none;-webkit-user-select:none
}
#card-detail-top{
  width:100%;display:flex;
  justify-content:space-between;align-items:center
}
#card-detail-danger{
  font-size:9px;letter-spacing:0.3em;
  padding:2px 8px;border:1px solid;font-weight:bold
}
#card-detail-id{
  font-size:9px;color:rgba(255,255,255,0.22);letter-spacing:0.3em
}
#card-detail-canvas{
  display:block;margin:6px 0
}
#card-detail-name{
  font-size:22px;letter-spacing:0.28em;
  text-align:center
}
#card-detail-sanskrit{
  font-size:13px;letter-spacing:0.05em;
  color:rgba(180,210,230,0.55);
  font-family:serif;line-height:1.5;text-align:center
}
#card-detail-badges{
  display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:2px
}
.cd-badge{
  font-size:8px;letter-spacing:0.25em;
  padding:3px 8px;border:1px solid rgba(255,255,255,0.15);
  color:rgba(200,220,240,0.75)
}
#card-detail-count{
  font-size:9px;color:rgba(0,200,255,0.65);letter-spacing:0.2em
}
#card-detail-caption{
  font-size:9px;line-height:1.75;letter-spacing:0.1em;
  color:rgba(160,200,220,0.6);text-align:center;
  max-width:280px
}
#card-detail-unknown{
  font-size:11px;letter-spacing:0.4em;
  color:rgba(255,255,255,0.14);
  padding:12px 0
}
/* navigation arrows */
#card-detail-prev,#card-detail-next{
  position:fixed;
  top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.5);
  font-size:18px;padding:18px 14px;
  cursor:pointer;z-index:910;
  -webkit-tap-highlight-color:transparent;
  transition:color 0.2s,border-color 0.2s
}
#card-detail-prev{left:8px}
#card-detail-next{right:8px}
#card-detail-prev:hover,#card-detail-next:hover{
  color:rgba(255,255,255,0.95);border-color:rgba(255,255,255,0.4)
}
#card-detail-close{
  position:fixed;top:20px;right:20px;
  background:none;border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.45);
  font-size:9px;letter-spacing:0.4em;
  padding:7px 14px;cursor:pointer;z-index:910;
  font-family:'Helvetica Neue',sans-serif;
  -webkit-tap-highlight-color:transparent;
  transition:color 0.2s,border-color 0.2s
}
#card-detail-close:hover{color:rgba(255,255,255,0.9);border-color:rgba(255,255,255,0.4)}
#card-detail-counter{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.2);
  font-size:9px;letter-spacing:0.4em;
  font-family:'Helvetica Neue',sans-serif;
  z-index:910;pointer-events:none
}
/* swipe hint dots */
#card-detail-dots{
  display:flex;gap:5px;margin-top:6px
}
.cd-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  transition:background 0.2s
}
.cd-dot.active{background:rgba(0,180,255,0.7)}
.cr-card.captured{
  border-color:rgba(0,180,255,0.3);
  box-shadow:0 0 12px rgba(0,150,255,0.08)
}
.cr-card.new-capture{
  animation:captureCardPulse 0.7s ease
}
@keyframes captureCardPulse{
  0%{box-shadow:0 0 0 rgba(0,200,255,0)}
  40%{box-shadow:0 0 28px rgba(0,200,255,0.55)}
  100%{box-shadow:0 0 12px rgba(0,150,255,0.08)}
}
.cr-card-top{
  width:100%;display:flex;justify-content:space-between;
  align-items:center
}
.cr-danger{
  font-size:8px;letter-spacing:0.3em;
  padding:2px 6px;border:1px solid;
  font-weight:bold
}
.cr-id{
  font-size:8px;color:rgba(255,255,255,0.2);
  letter-spacing:0.25em
}
.cr-count{
  font-size:8px;color:rgba(0,200,255,0.6);
  letter-spacing:0.2em
}
.cr-icon{display:block}
.cr-name{
  font-size:13px;letter-spacing:0.3em;
  color:rgba(200,240,255,0.92);
  text-align:center
}
.cr-name-unknown{
  font-size:13px;letter-spacing:0.2em;
  color:rgba(255,255,255,0.12);
  text-align:center
}
.cr-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.cr-badge{
  font-size:7px;letter-spacing:0.25em;
  padding:2px 5px;border:1px solid rgba(255,255,255,0.15);
  color:rgba(200,220,240,0.7)
}
.cr-caption{
  font-size:8px;line-height:1.6;letter-spacing:0.08em;
  color:rgba(160,200,220,0.55);
  text-align:center;width:100%;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden
}
.cr-unknown-badge{
  font-size:8px;letter-spacing:0.35em;
  color:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.07);
  padding:3px 10px
}
.cr-sanskrit{
  font-size:11px;letter-spacing:0.05em;
  color:rgba(180,210,230,0.5);
  text-align:center;
  font-family:serif;
  line-height:1.4
}

/* ---- audio toggle ---- */
#audio-btn{
  position:fixed;top:28px;left:24px;
  z-index:150;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.45);
  font-size:11px;letter-spacing:0.3em;
  font-family:'Helvetica Neue',sans-serif;
  padding:7px 13px;cursor:pointer;
  transition:color 0.2s,border-color 0.2s;
  -webkit-tap-highlight-color:transparent;
  user-select:none
}
#audio-btn:hover{color:rgba(255,255,255,0.9);border-color:rgba(255,255,255,0.35)}
#audio-btn.muted{
  color:rgba(200,60,60,0.55);
  border-color:rgba(200,60,60,0.2)
}
</style>
</head>
<body>
<div id="loading">
  <div id="loading-text">LOADING</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

<script>
// ウォッチドッグ: 12秒以内にロード完了しなければエラー表示
window._loadWatchdog = setTimeout(function() {
  var le = document.getElementById('loading-error');
  var lt = document.getElementById('loading-text');
  var pb = document.getElementById('progress-bar');
  if (le) { le.style.display = 'flex'; }
  if (lt) { lt.style.display = 'none'; }
  if (pb) { pb.style.display = 'none'; }
}, 12000);
window.onerror = function(msg, src, line, col, err) {
  clearTimeout(window._loadWatchdog);
  var le = document.getElementById('loading-error');
  var lt = document.getElementById('loading-text');
  var pb = document.getElementById('progress-bar');
  if (le && le.style.display !== 'flex') {
    le.style.display = 'flex';
    if (lt) lt.style.display = 'none';
    if (pb) pb.style.display = 'none';
  }
};
</script>
